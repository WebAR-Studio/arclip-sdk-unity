<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>
    <meta name="description" content="">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script>
      window.VPS_CONFIG = {
        captureInterval: 2500,
        jpegQuality: 1.0,
        targetWidth: 540,
        targetHeight: 960
      };
    </script>
    <script src="arclip-webxr.js"></script>
    <script src="webxr-unity-bridge.js"></script>
    <script src="vps-client.js"></script>
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-canvas-container" style="width: 100%; height: 100%;">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <button id="entervr" value="Enter VR" disabled>VR</button>
        <button id="enterar" value="Enter AR" disabled>AR</button>
        <div id="unity-webxr-link">Using <a href="https://github.com/De-Panther/unity-webxr-export" target="_blank" title="WebXR Export">WebXR Export</a></div>
        <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#else
        codeUrl: "",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var unityInstance = null;

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = buildUrl + "/{{{ LOADER_FILENAME }}}";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
          unityInstance = instance;
          window.myGameInstance = instance;
          loadingBar.style.display = "none";
          hookWebXRCallbacks();
          if (window.ARClipWebXRBridge && typeof window.ARClipWebXRBridge.onUnityInstanceReady === 'function') {
            window.ARClipWebXRBridge.onUnityInstanceReady();
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      let enterARButton = document.getElementById('enterar');
      let enterVRButton = document.getElementById('entervr');

      document.addEventListener('onARSupportedCheck', function (event) {
        enterARButton.disabled = !event.detail.supported;
      }, false);
      document.addEventListener('onVRSupportedCheck', function (event) {
        enterVRButton.disabled = !event.detail.supported;
      }, false);

      enterARButton.addEventListener('click', function () {
        var webXR = getWebXRModule();
        if (!webXR) {
          return;
        }
        webXR.toggleAR();
      }, false);
      enterVRButton.addEventListener('click', function () {
        var webXR = getWebXRModule();
        if (!webXR) {
          return;
        }
        webXR.toggleVR();
      }, false);

      function getWebXRModule() {
        var webXR = unityInstance && unityInstance.Module && unityInstance.Module.WebXR;
        if (!webXR) {
          console.error('WebXRVPS template requires a Unity build with WebXR support.');
          alert('WebXRVPS template requires a Unity build with WebXR support.');
          return null;
        }

        return webXR;
      }

      function hookWebXRCallbacks() {
        var M = unityInstance.Module;
        var webXR = getWebXRModule();
        if (!webXR) {
          return;
        }

        var origOnStartAR = webXR.OnStartAR;
        webXR.OnStartAR = function () {
          origOnStartAR.apply(this, arguments);
        };

        var origOnEndXR = webXR.OnEndXR;
        webXR.OnEndXR = function () {
          origOnEndXR.apply(this, arguments);
        };

        if (window.VPSClient) {
          VPSClient.init(unityInstance);
        }
      }
    </script>
  </body>
</html>
